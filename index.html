<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Card</title>
<link rel="stylesheet" href="/https://github.com/JuanPablo140025/Creador-de-cartas-pokemon/settings/pages/style.css">
</head>
<body>

<h1>Trainer Card</h1>

<div class="contenedor">

<form id="formulario">
    <h2>Entrenador</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="number" id="edad" placeholder="Edad">
    <input type="text" id="ciudad" placeholder="Ciudad">

    <h2>Pokémon</h2>
    <input type="text" id="pokemonNombre" placeholder="Nombre Pokémon">
    <input type="text" id="tipo" placeholder="Tipo">
    <input type="text" id="imagen" placeholder="URL Imagen">

    <button type="submit">Crear Tarjetas</button>
</form>

<div class="tarjetas" id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
